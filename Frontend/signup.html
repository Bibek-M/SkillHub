<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
    .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    position: relative;
    z-index: 1;
    background-color: #ffffff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
}

.nav-brand {
    font-size: 24px;
    font-weight: 700;
    color: #181e4b;
}

.nav-links {
    display: flex;
    gap: 30px;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: #5e6282;
    font-size: 16px;
    transition: color 0.3s ease;
}

.nav-links a:hover {
    color: #181e4b;
}

.nav-links a:nth-child(2) {
    border: 2px solid #181e4b;
    padding: 8px 20px;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.nav-links a:nth-child(2):hover {
    background-color: #181e4b;
    color: #ffffff;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .navbar {
        padding: 15px 20px;
        flex-wrap: wrap;
    }

    .nav-brand {
        font-size: 20px;
    }

    .nav-links {
        gap: 15px;
        font-size: 14px;
    }

    .nav-links a:nth-child(2) {
        padding: 6px 16px;
        font-size: 14px;
    }

    body::before {
        width: 400px;
        height: 400px;
    }
}

@media (max-width: 480px) {
    .navbar {
        padding: 10px 15px;
    }

    .nav-brand {
        font-size: 18px;
    }

    .nav-links {
        gap: 10px;
        font-size: 12px;
    }
}
    .background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #fdf2ea;
    z-index: -1;
}
.background-color {
    background-color: #d5d4d4;
    margin: 50px;
}
.container {
        display: flex;
        max-width: 700px;
        margin: 50px auto;
        background: linear-gradient(135deg, #fafbfc 60%, #e3e6f3 100%);
        border-top-left-radius: 60px 120px;
        border-bottom-right-radius: 60px 120px;
        box-shadow: 0 8px 32px rgba(122, 156, 255, 0.12), 0 1.5px 8px rgba(24, 30, 75, 0.07);
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        overflow: hidden;
        min-height: 400px;
    }
    .left-side {
        flex: 1;
        background: #f0f2f5;
        color: #333;
        padding: 36px 24px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-top-right-radius: 10px;
    }
    .left-side h2 {
        font-size: 1.7rem;
        margin-bottom: 18px;
        font-weight: 600;
    }
    .quotes {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .quotes li {
        margin-bottom: 14px;
        font-size: 1rem;
        font-style: italic;
        line-height: 1.4;
    }
    .right-side {
        flex: 1;
        padding: 36px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
    }
    .login-form {
        width: 100%;
        max-width: 280px;
        background: #fff;
        padding: 24px 16px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .login-form h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #222;
        font-weight: 500;
    }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #444;
        font-size: 0.98rem;
    }
    .form-group input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        background: #f9f9f9;
        transition: border 0.2s;
    }
    .form-group input:focus {
        border-color: #7a9cff;
        outline: none;
    }
    .login-btn {
        width: 100%;
        padding: 10px;
        background: #7a9cff;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }
    .login-btn:hover {
        background: #5a7bd8;
    }
    .signup-link {
        text-align: center;
        margin-top: 12px;
        font-size: 0.95rem;
    }
    .signup-link a {
        color: #7a9cff;
        text-decoration: none;
        font-weight: 500;
    }
    .signup-link a:hover {
        text-decoration: underline;
    }
    @media (max-width: 700px) {
        .container {
            flex-direction: column;
            min-height: unset;
        }
        .left-side, .right-side {
            padding: 24px 10px;
        }
        .left-side {
            text-align: center;
        }
    }

</style>
</head>

<body class="background">

<div class="container">
<div class="right-side">

<form class="login-form" onsubmit="signup(event)">

<h2>Sign Up</h2>

<div class="form-group">
<label for="username">Username</label>
<input type="text" id="username" required placeholder="Enter username">
</div>

<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" required placeholder="Enter your email">
</div>

<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" required placeholder="Enter your password">
</div>

<button type="submit" class="login-btn">Sign Up</button>

<p class="signup-link">
Already have an account?
<a href="#" onclick="goToSignin()">Login</a>
</p>

</form>

</div>
</div>

<script>

async function signup(event){

event.preventDefault();

const username = document.getElementById("username").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const response = await axios.post("http://localhost:3000/signup",{
username: username,
email: email,
password: password
});

alert("Account created successfully");

// redirect to login page
window.location = "/signin";

}catch(error){

alert("Signup failed");

}

}

function goToSignin(){
window.location = "/signin.html";
}

</script>

</body>
</html>
