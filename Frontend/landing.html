<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background-color: #f6f5f5;
    position: relative;
    overflow-x: hidden;
}
.landing-page::before {
    content: "";
    position: absolute;
    top: -150px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: #fdf2e9;
    border-radius: 50%;
    z-index: 0;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    position: relative;
    z-index: 1;
    background-color: #ffffff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
}

.nav-brand {
    font-size: 24px;
    font-weight: 700;
    color: #181e4b;
}

.nav-links {
    display: flex;
    gap: 30px;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: #5e6282;
    font-size: 16px;
    transition: color 0.3s ease;
}

.nav-links a:hover {
    color: #181e4b;
}

.nav-links a:nth-child(2) {
    border: 2px solid #181e4b;
    padding: 8px 20px;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.nav-links a:nth-child(2):hover {
    background-color: #181e4b;
    color: #ffffff;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .navbar {
        padding: 15px 20px;
        flex-wrap: wrap;
    }

    .nav-brand {
        font-size: 20px;
    }

    .nav-links {
        gap: 15px;
        font-size: 14px;
    }

    .nav-links a:nth-child(2) {
        padding: 6px 16px;
        font-size: 14px;
    }

    body::before {
        width: 400px;
        height: 400px;
    }
}

@media (max-width: 480px) {
    .navbar {
        padding: 10px 15px;
    }

    .nav-brand {
        font-size: 18px;
    }

    .nav-links {
        gap: 10px;
        font-size: 12px;
    }
}
.header {
    text-align: center;
    padding: 100px 40px;
    position: relative;
    z-index: 1;
}
.header-head {
    padding-bottom: 20px;
}
.button {
    background-color: #181e4b;
    color: #ffffff;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
}
</style>
</head>

<body class="landing-page">

<nav class="navbar">
    <div class="nav-brand">Skill Hub</div>

    <div class="nav-links">
        <a href="#" onclick="landing()">Home</a>
        <a href="#" onclick="signup()">Sign Up</a>
        <a href="#" onclick="login()">Login</a>
        <a href="#" onclick="dashboard()">Dashboard</a>
        <a href="#" onclick="create()">Create Skill</a>
    </div>
</nav>

<header class="header">
    <h1 class="header-head">Welcome to Skill Hub</h1>

    <p class="header-paragraph">
        Your platform for learning and sharing skills and connecting with your peers.
    </p>

    <button class="button" onclick="dashboard()">Explore</button>
</header>

<script>

function landing(){
    window.location = "./landing";
}

function signup(){
    window.location = "./signup";
}

function login(){
    window.location = "./signin";
}

function dashboard(){
    window.location = "./dashboard";
}

function create(){
    window.location = "./createSkill";
}

</script>

</body>
</html>
